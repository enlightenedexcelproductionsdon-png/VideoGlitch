<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Glitch Effect</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .video-container {
      position: relative;
      width: 80%;
      max-width: 800px;
    }
    video {
      width: 100%;
      display: block;
    }
    .glitch {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,0,0,0.2);
      mix-blend-mode: screen;
      animation: glitchAnim 0.5s infinite;
      pointer-events: none;
    }
    @keyframes glitchAnim {
      0% { transform: translate(0,0); opacity: 0.2; }
      25% { transform: translate(-5px,2px); opacity: 0.4; }
      50% { transform: translate(5px,-2px); opacity: 0.6; }
      75% { transform: translate(-3px,3px); opacity: 0.3; }
      100% { transform: translate(0,0); opacity: 0.2; }
    }
  </style>
</head>
<body>
  <div class="video-container">
    <video id="myVideo" autoplay loop muted>
      <source src="your-video.mp4" type="video/mp4">
      Your browser does not support HTML5 video.
    </video>
    <div class="glitch"></div>
  </div>

  <script>
    // Example: Add a flashing effect when clicking the video
    const video = document.getElementById('myVideo');
    video.addEventListener('click', () => {
      video.style.filter = 'contrast(200%) saturate(200%)';
      setTimeout(() => {
        video.style.filter = 'none';
      }, 300);
    });
  </script>
</body>
</html>
